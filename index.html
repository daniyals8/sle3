<!DOCTYPE html>
<html>
	<head>   
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    >
	  <style>
      body {
        background-color: #010409;
        font-family: monospace;
      }
      h1 {
        color: #e7f0f9;
        text-align: center;
      }
      textarea {
        width: 90%;
        margin-left: 2%;
        background-color: #0d1117;
        color: #5f6869;
        padding: 8px;
        border-width: medium;
        border-color: #2a3038;
      }
      .button {
      display: inline-block;
      font-family: monospace;
      font-size: 15px;
      font-weight: bold;
      color: #28261d;
      padding: 7px;
      margin: 2px;
      border: none;
      border-radius: 70px;
      width: 50%;
      cursor: pointer;
      }
      .button1 {
        background-color: #d3651f;
        width: 25%;
      }
      .button2 {
        background-color: #2d6ac5;
        width: 25%;
      }
      #outputText {
      color: #00FF41; /* Neon hacker green */
      /*background-color: black;*/
      font-family: 'Courier New', Courier, monospace;
      padding: 15px;
      min-height: 50px;
      font-size: 18px;
      font-weight: bold;
      word-wrap: break-word;
    }
    </style>  
	</head>
	
	<body>
		<h1>Ocx Tlsx Mtrisj Svpbcq s-le.3</h1>
		<textarea id="inputText" rows="7" cols="45">Hello Trawas!</textarea><br><br>
		<button class="button button1" onclick="processText('encrypt')">encrypt</button>
		<button class="button button2" onclick="processText('decrypt')">decrypt</button><br><br>
		<div id="outputText"></div>

		<script>
  // Moved the keys outside so both functions can use them easily
			const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
			const baseKey = "HIDUPJOKWQERTYASFGLZXCVBNM";
			function processText(mode) {
	// Remove all spaces from the input right away using a Regex (.replace)
      let text = document.getElementById("inputText").value.toUpperCase().replace(/ /g, '');
			let currentKey = baseKey; 
			let result = "";
  // Loop through the text and swap letters
			for (let i = 0; i < text.length; i++) {
			let char = text[i];
  // If the letter exists in our map, swap it.
  // Otherwise, keep it exactly as it is (for spaces, !, ?, etc.)
			if (mode === 'encrypt') {
			let index = alphabet.indexOf(char);
			if (index !== -1) {
            result += currentKey[index];
            currentKey = currentKey.substring(1) + currentKey[0]; // Spin rotor
			} else {
            result += char; 
          }
        } 
			else if (mode === 'decrypt') {
  // Find the character in the ROTATED key instead
			let index = currentKey.indexOf(char);
			if (index !== -1) {
            result += alphabet[index]; // Bring it back to normal A-Z
            currentKey = currentKey.substring(1) + currentKey[0]; // Spin rotor exactly the same way!
          } else {
            result += char; 
          }
        }
      }
  // Group the final text into blocks of 4 and join them with a space
      let finalOutput = result;
      if (mode === 'encrypt') {
        let match = result.match(/.{1,4}/g);
        finalOutput = match ? match.join(' ') : "";
      }
  // Changed .value to .innerText to write directly into the <div>
      document.getElementById("outputText").innerText = finalOutput;
    }
		</script>

</body>
</html>
